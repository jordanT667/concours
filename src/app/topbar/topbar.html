<header class="topbar">

  <!-- Bouton hamburger (mobile uniquement) -->
  <button type="button" class="btn-hamburger" (click)="toggleSidebar.emit()" aria-label="Menu">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
      stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
    </svg>
  </button>

  <!-- Titre page + infos ESTM -->
  <div class="topbar-left">
    <h1 class="page-titre">Gestion Concours ESTM</h1>
    <span class="page-sous-titre">
      Université de Bertoua — Année 2026/2027
    </span>
  </div>

  <!-- Actions à droite -->
  <div class="topbar-right">

    <!-- Toggle dark / light -->
    <button
      type="button"
      class="btn-icone btn-theme"
      [title]="themeService.isDark ? 'Passer en mode clair' : 'Passer en mode sombre'"
      (click)="themeService.toggle()"
      aria-label="Changer le thème">
      @if (themeService.isDark) {
        <!-- Soleil -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386
               6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591
               1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75
               3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
      } @else {
        <!-- Lune -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385
               0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753
               9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753
               0 0 0 9.002-5.998Z" />
        </svg>
      }
    </button>

    <!-- Icône notifications -->
    <button class="btn-icone" title="Notifications">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none"
        viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M14.857 17.082a23.848 23.848 0 0 0
          5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6
          6 0 0 0 6 9v.75a8.967 8.967 0 0
          1-2.312 6.022c1.733.64 3.56 1.085
          5.455 1.31m5.714 0a24.255 24.255 0 0
          1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
      </svg>
      <span class="badge">3</span>
    </button>

    <!-- Profil admin -->
    <div class="profil-wrapper topbar-profil">
      <button class="btn-profil" (click)="toggleMenu()">
        <div class="avatar">{{ initiales }}</div>
        <div class="profil-info">
          <span class="admin-nom">{{ nomAdmin }}</span>
          <span class="role-badge" [class.role-admin]="roleBadge === 'Admin'"
                                   [class.role-saisie]="roleBadge === 'Saisie'">
            {{ roleBadge }}
          </span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="chevron" [class.rotate]="menuOuvert">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="m19.5 8.25-7.5 7.5-7.5-7.5" />
        </svg>
      </button>

      @if (menuOuvert) {
        <div class="dropdown-menu">
          <a routerLink="/admin/profil" class="dropdown-item">
            Mon profil
          </a>
          <a routerLink="/admin/parametres" class="dropdown-item">
            Paramètres
          </a>
          <hr class="dropdown-divider" />
          <button class="dropdown-item danger" (click)="logout()">
            Déconnexion
          </button>
        </div>
      }
    </div>

  </div>
</header>
