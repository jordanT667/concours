<div class="form-container">

  <div class="form-header">
    <div>
      <h3 class="form-titre">
        {{ estModification ? 'Modifier la filière' : 'Nouvelle filière' }}
      </h3>
      <p class="form-sous-titre">ESTM — {{ form.codeFiliere || 'Nouvelle entrée' }}</p>
    </div>
    <button type="button" class="btn-fermer" (click)="annuler.emit()">✕</button>
  </div>

  <form class="form-body" (ngSubmit)="onSubmit()">

    <div class="champ">
      <label class="champ-label">Code filière *</label>
      <input type="text"
        class="champ-input"
        [(ngModel)]="form.codeFiliere"
        name="codeFiliere"
        placeholder="Ex: TOPO"
        (input)="onCodeInput()"
        maxlength="20"
        [disabled]="estModification"
        required />
      @if (estModification) {
        <span class="champ-hint">Le code ne peut pas être modifié</span>
      }
    </div>

    <div class="champ">
      <label class="champ-label">Libellé français *</label>
      <input type="text"
        class="champ-input"
        [(ngModel)]="form.libelleFiliereFr"
        name="libelleFiliereFr"
        placeholder="Ex: Topographie"
        required />
    </div>

    <div class="champ">
      <label class="champ-label">Libellé anglais</label>
      <input type="text"
        class="champ-input"
        [(ngModel)]="form.libelleFiliereEn"
        name="libelleFiliereEn"
        placeholder="Ex: Topography" />
    </div>

    <div class="champ">
      <label class="champ-label">Cursus</label>
      <select class="champ-input" [(ngModel)]="form.idCursus" name="idCursus" title="Cursus">
        <option value="">-- Sélectionner --</option>
        @for (c of allCursus; track c.idCursus) {
          <option [value]="c.idCursus">{{ c.libelle }} ({{ c.idCursus }})</option>
        }
      </select>
    </div>

    <div class="champ">
      <label class="champ-label">Niveau</label>
      <select class="champ-input" [(ngModel)]="form.codeNiveau" name="codeNiveau" title="Niveau">
        <option value="">-- Sélectionner --</option>
        @for (n of allNiveaux; track n.codeNiveau) {
          <option [value]="n.codeNiveau">{{ n.libelleNiveau }} ({{ n.codeNiveau }})</option>
        }
      </select>
    </div>

    <div class="champ">
      <label class="champ-label">École</label>
      <select class="champ-input" [(ngModel)]="form.codeEcole" name="codeEcole" title="École">
        <option value="">-- Sélectionner --</option>
        @for (e of allEcoles; track e.codeEcole) {
          <option [value]="e.codeEcole">{{ e.libelleFr || e.codeEcole }} ({{ e.codeEcole }})</option>
        }
      </select>
    </div>

    @if (erreur) {
      <div class="erreur-msg">{{ erreur }}</div>
    }

    <div class="form-actions">
      <button type="button" class="btn-annuler" (click)="annuler.emit()">Annuler</button>
      <button type="submit" class="btn-sauvegarder">
        {{ estModification ? '✓ Modifier' : '+ Ajouter' }}
      </button>
    </div>

  </form>
</div>
