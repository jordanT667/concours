<div class="dashboard">

  @if (dashboardState$ | async; as state) {

    @switch (state.dataState) {

      @case ('LOADING') {
        <app-dashboard-skeleton></app-dashboard-skeleton>
      }

      @case ('ERROR') {
        <div class="alerte-erreur">
          <i class="fa-solid fa-triangle-exclamation"></i>
          {{ state.error }}
          <button type="button" (click)="chargerDashboard()">Réessayer</button>
        </div>
      }

      @case ('LOADED') {

        <!-- Bandeau de bienvenue -->
        <app-welcome-banner
          [prenom]="prenomAdmin"
          [nom]="nomAdmin"
          [totalInscrits]="state.data!.totalInscrits">
        </app-welcome-banner>

        <!-- 4 cartes statistiques -->
        <app-stats-overview [stats]="state.data!"></app-stats-overview>

        <!-- Ligne : inscriptions récentes + répartition centres -->
        <div class="dashboard-grille">

          <app-inscriptions-recentes
            [inscriptions]="[]"
            (voirTout)="allerInscriptions()">
          </app-inscriptions-recentes>

          <app-repartition-centres
            [parCentre]="state.data!.parCentre">
          </app-repartition-centres>

        </div>

        <!-- Ligne : graphiques répartitions -->
        <div class="dashboard-charts">
          <app-repartition-filieres
            [parFiliere]="state.data!.parFiliere">
          </app-repartition-filieres>
        </div>

        <!-- Raccourcis actions rapides -->
        <div class="actions-rapides">
          <h3 class="section-titre">Actions rapides</h3>
          <div class="actions-grille">

            <button type="button" class="action-card" (click)="allerInscriptions()">
              <span class="action-label">Voir toutes les inscriptions</span>
              <span class="action-flèche">→</span>
            </button>

            <button type="button" class="action-card" (click)="allerCandidats()">
              <span class="action-label">Gérer les candidats</span>
              <span class="action-flèche">→</span>
            </button>

            <button type="button" class="action-card" disabled title="Fonctionnalité à venir">
              <span class="action-label">Publier les résultats</span>
              <span class="action-flèche">→</span>
            </button>

            <button type="button" class="action-card" routerLink="/admin/centres">
              <span class="action-label">Gérer les centres</span>
              <span class="action-flèche">→</span>
            </button>

            <button type="button" class="action-card" routerLink="/admin/annonces">
              <span class="action-icone">+</span>
              <span class="action-label">Gérer les annonces</span>
              <span class="action-flèche">→</span>
            </button>

          </div>
        </div>

      }

    }

  }

</div>
