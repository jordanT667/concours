<div class="chart-card">
  <div class="chart-header">
    <h3 class="chart-titre">Répartition par centre</h3>
    <span class="chart-badge">{{ slices.length }} centres</span>
  </div>

  @if (slices.length > 0) {
    <app-donut-chart [slices]="slices"></app-donut-chart>
  } @else {
    <div class="chart-vide">Aucune donnée disponible</div>
  }
</div>
