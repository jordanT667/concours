<div class="banner">

  <!-- Texte gauche -->
  <div class="banner-texte">
    <p class="banner-date">{{ dateAujourdhui }}</p>
    <h2 class="banner-titre">
      {{ salutation }}, {{ prenom }} 
    </h2>
    <p class="banner-sous-titre">
      Bienvenue sur le panneau d'administration du concours ESTM.
    </p>
    <div class="banner-badge">
      <span class="badge-point"></span>
      {{ totalInscrits }} candidats inscrits à ce jour
    </div>
  </div>

  <!-- Illustration droite -->
  <div class="banner-illustration">
    <div class="illustration-cercle cercle-1"></div>
    <div class="illustration-cercle cercle-2"></div>
    <div class="illustration-cercle cercle-3"></div>
    <span class="illustration-emoji"></span>
  </div>

</div>
