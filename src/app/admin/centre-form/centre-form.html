<div class="form-container">

  <div class="form-header">
    <h3 class="form-titre">
      {{ estModification ? 'Modifier le centre' : 'Nouveau centre' }}
    </h3>
    <button class="btn-fermer" title="Fermer" (click)="annuler.emit()"><i class="fas fa-times"></i></button>
  </div>

  <form class="form-body" (ngSubmit)="onSubmit()">

    <!-- Code -->
    <div class="champ">
      <label class="champ-label">Code du centre *</label>
      <input type="text"
        class="champ-input"
        [(ngModel)]="form.idCexam"
        name="idCexam"
        placeholder="Ex: CEN_YDE"
        [disabled]="estModification"
        required
        maxlength="10" />
    </div>

    <!-- Libellé -->
    <div class="champ">
      <label class="champ-label">Libellé *</label>
      <input type="text"
        class="champ-input"
        [(ngModel)]="form.libeleFiliereFr"
        name="libeleFiliereFr"
        placeholder="Ex: Centre de Yaoundé"
        required
        maxlength="50" />
    </div>

    <!-- Niveaux associés -->
    <div class="champ">
      <label class="champ-label">Niveaux associés</label>
      <div class="niveaux-checkboxes">
        @for (niveau of niveauxDisponibles; track niveau.codeNiveau) {
          <label class="checkbox-label">
            <input type="checkbox"
              [checked]="isNiveauSelected(niveau.codeNiveau)"
              (change)="toggleNiveau(niveau.codeNiveau)" />
            {{ niveau.libelleNiveau }}
          </label>
        }
      </div>
    </div>

    <!-- Boutons -->
    <div class="form-actions">
      <button type="button"
        class="btn-annuler"
        (click)="annuler.emit()">
        Annuler
      </button>
      <button type="submit" class="btn-sauvegarder">
        {{ estModification ? 'Modifier' : 'Ajouter' }}
      </button>
    </div>

  </form>

</div>
