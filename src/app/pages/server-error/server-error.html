<div class="error-page error-500">
  <div class="error-card">

    <!-- Illustration SVG -->
    <div class="error-illustration">
      <svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Sol -->
        <ellipse cx="100" cy="128" rx="80" ry="8" fill="#e5e7eb" opacity="0.5"/>
        <!-- Serveur principal -->
        <rect x="50" y="40" width="100" height="28" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
        <circle cx="68" cy="54" r="5" fill="#27ae60"/>
        <rect x="78" y="49" width="30" height="4" rx="2" fill="#e5e7eb"/>
        <rect x="78" y="56" width="20" height="4" rx="2" fill="#e5e7eb"/>
        <rect x="130" y="50" width="10" height="8" rx="2" fill="#e5e7eb"/>
        <!-- Serveur 2 -->
        <rect x="50" y="76" width="100" height="28" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="2"/>
        <circle cx="68" cy="90" r="5" fill="#dc2626"/>
        <rect x="78" y="85" width="30" height="4" rx="2" fill="#e5e7eb"/>
        <rect x="78" y="92" width="20" height="4" rx="2" fill="#e5e7eb"/>
        <rect x="130" y="86" width="10" height="8" rx="2" fill="#fecaca"/>
        <!-- Éclair -->
        <path d="M96 22 L88 36 L96 36 L88 50" stroke="#f59e0b" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M108 20 L100 34 L108 34 L100 48" stroke="#f59e0b" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
      </svg>
    </div>

    <div class="error-code">500</div>
    <h1 class="error-titre">Erreur serveur</h1>
    <p class="error-desc">
      Une erreur interne s'est produite. Nos équipes techniques ont été alertées.
    </p>

    <div class="error-actions">
      <button type="button" class="btn-secondary" (click)="retour()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
        </svg>
        Accueil
      </button>
      <button type="button" class="btn-primary" (click)="recharger()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0
               2.123 2.123a9.003 9.003 0 0 1 16.498-1.49M20 5a9.002 9.002 0 0 1-5.277
               8.111"/>
        </svg>
        Réessayer
      </button>
    </div>

  </div>

 
</div>
