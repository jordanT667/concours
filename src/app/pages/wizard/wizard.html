<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">
      <img src="/enstmo.jfif" alt="ENSTMO" class="logo-img"/>
      <span class="logo-text">ENSTMO</span>
    </div>
  </div>
</header>

<div class="page-title-bar">
  <h1 class="page-title">Formulaire de Préinscription</h1>
  <nav class="breadcrumb" aria-label="Fil d'Ariane">
    <a class="breadcrumb-link" routerLink="/login">Home</a>
    <span class="breadcrumb-sep">&rsaquo;</span>
    <span class="breadcrumb-current">Inscription</span>
  </nav>
</div>

<main class="wizard-container">
  <div class="wizard-card">

    <nav class="wizard-nav" role="tablist" aria-label="Étapes d'inscription">
      @for (step of steps; track step.route; let i = $index) {
        <button
          type="button"
          class="wizard-tab"
          [class.active]="currentStep === i"
          [class.completed]="currentStep > i"
          [attr.aria-selected]="currentStep === i"
          role="tab"
          (click)="goToStep(i)"
        >
          {{ step.label }}
        </button>
      }
    </nav>

    <div class="wizard-divider"></div>

    <div class="wizard-body">
      <router-outlet></router-outlet>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <p>Copyright &copy; 2026-2027 <span>ENSTMO/NHPSD Ueb.</span> all rights reserved.</p>
  </div>
</footer>
