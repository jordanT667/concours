<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">
      <img src="/enstmo.jfif" alt="ENSTMO" class="logo-img"/>
      <span class="logo-text">ENSTMO</span>
    </div>
  </div>
</header>

<div class="page-title-bar">
  <h1 class="page-title">Formulaire de Préinscription</h1>
  <nav class="breadcrumb" aria-label="Fil d'Ariane">
    <a class="breadcrumb-link" routerLink="/login">Home</a>
    <span class="breadcrumb-sep">&rsaquo;</span>
    <span class="breadcrumb-current">Inscription</span>
  </nav>
</div>

<main class="wizard-container">
  <div class="wizard-card">

    <!-- ── Stepper visuel ── -->
    <nav class="wizard-stepper" role="tablist" aria-label="Étapes d'inscription">
      @for (step of steps; track step.route; let i = $index) {

        <!-- Ligne de connexion (avant chaque step sauf le premier) -->
        @if (i > 0) {
          <div class="stepper-line" [class.done]="currentStep > i - 1"></div>
        }

        <!-- Cercle + label -->
        <button
          type="button"
          class="stepper-step"
          [class.active]="currentStep === i"
          [class.completed]="currentStep > i"
          [attr.aria-selected]="currentStep === i"
          [attr.aria-label]="'Étape ' + (i + 1) + ' : ' + step.label"
          role="tab"
          (click)="goToStep(i)">

          <div class="stepper-circle">
            @if (currentStep > i) {
              <!-- Coche checkmark -->
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
              </svg>
            } @else {
              {{ i + 1 }}
            }
          </div>

          <span class="stepper-label">{{ step.label }}</span>

        </button>
      }
    </nav>

    <div class="wizard-body">
      <router-outlet></router-outlet>
    </div>

  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <p>Copyright &copy; 2026-2027 <span>ENSTMO/NHPSD Ueb.</span> all rights reserved.</p>
  </div>
</footer>
